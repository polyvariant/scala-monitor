name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: scala-monitor-linux
          - os: macos-latest
            artifact: scala-monitor-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: VirtusLab/scala-cli-setup@v1

      - name: Build native binary
        run: scala-cli --power package . -o scala-monitor --native

      - name: Install sbt
        run: cs install sbt --install-dir /usr/local/bin

      - name: Integration test
        run: |
          chmod +x scala-monitor

          # Launch a Scala/JVM process via scala-cli
          printf '@main def sleep(): Unit = Thread.sleep(30000)\n' > /tmp/Sleep.scala
          scala-cli run /tmp/Sleep.scala &
          SCALA_CLI_PID=$!

          # Create a minimal sbt project and launch sbt
          mkdir -p /tmp/sleep-sbt/project
          printf 'name := "sleep"\nset Global / onLoad := { val _ = Thread.sleep(30000); (Global / onLoad).value }\n' > /tmp/sleep-sbt/build.sbt
          (cd /tmp/sleep-sbt && sbt -Dsbt.log.noformat=true </dev/null > /dev/null 2>&1) &
          SBT_PID=$!

          sleep 30

          # Verify sbt is running
          ps aux | grep -i 'xsbt.boot.Boot\|sbt-launch' | grep -v grep || echo "WARN: sbt process not found in ps"

          echo "=== scala-monitor output ==="
          OUTPUT=$(./scala-monitor)
          echo "$OUTPUT"

          echo "=== assertions ==="
          echo "$OUTPUT" | grep -q "Bloop" || (echo "FAIL: Bloop not detected"; exit 1)
          echo "$OUTPUT" | grep -q "SCALA PROCESS MONITOR" || (echo "FAIL: Header missing"; exit 1)
          echo "$OUTPUT" | grep -q "RSS" || (echo "FAIL: RSS column missing"; exit 1)
          echo "$OUTPUT" | grep -qi "sbt" || (echo "FAIL: sbt not detected"; exit 1)

          ./scala-monitor --help | grep -q "filter" || (echo "FAIL: Help missing filter"; exit 1)
          echo "PASS: All assertions passed"

          kill $SCALA_CLI_PID $SBT_PID 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: scala-monitor

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          mv artifacts/scala-monitor-linux/scala-monitor release-assets/scala-monitor-linux
          mv artifacts/scala-monitor-darwin/scala-monitor release-assets/scala-monitor-darwin

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
