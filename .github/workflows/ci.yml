name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: scala-monitor-linux
          - os: macos-14
            artifact: scala-monitor-aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: VirtusLab/scala-cli-setup@v1

      - name: Unit tests
        run: scala-cli --power test .

      - name: Build native binary
        run: scala-cli --power package . -o scala-monitor --native

      - name: Install sbt
        run: cs install sbt --install-dir /usr/local/bin

      - name: Integration test
        run: scripts/integration-test.sh

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: scala-monitor

  publish-snapshot:
    needs: build
    if: |
      github.ref == 'refs/heads/main' || 
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: VirtusLab/scala-cli-setup@v1
        with:
          power: true

      - name: Publish snapshot
        run: |
          scala-cli config publish.credentials central.sonatype.com env:SONATYPE_USERNAME env:SONATYPE_PASSWORD
          scala-cli config publish.credentials ossrh-staging-api.central.sonatype.com env:SONATYPE_USERNAME env:SONATYPE_PASSWORD
          ./.github/workflows/import-gpg.sh
          scala-cli publish . --signer gpg --gpg-key DB33C5B9DA1A245B
        env:
          PGP_PASSPHRASE: ""
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: VirtusLab/scala-cli-setup@v1
        with:
          power: true

      - name: Publish to Sonatype
        run: |
          scala-cli config publish.credentials central.sonatype.com env:SONATYPE_USERNAME env:SONATYPE_PASSWORD
          scala-cli config publish.credentials ossrh-staging-api.central.sonatype.com env:SONATYPE_USERNAME env:SONATYPE_PASSWORD
          ./.github/workflows/import-gpg.sh
          scala-cli publish . --signer gpg --gpg-key DB33C5B9DA1A245B
        env:
          PGP_PASSPHRASE: ""
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          mv artifacts/scala-monitor-linux/scala-monitor release-assets/scala-monitor-linux
          mv artifacts/scala-monitor-aarch64-apple-darwin/scala-monitor release-assets/scala-monitor-aarch64-apple-darwin
          cp release-assets/scala-monitor-aarch64-apple-darwin release-assets/scala-monitor-darwin

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
