name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: scala-monitor-x86_64-pc-linux
            run-integration: true
          - os: ubuntu-24.04-arm
            artifact: scala-monitor-aarch64-pc-linux
            run-integration: false
          - os: macos-15
            artifact: scala-monitor-aarch64-apple-darwin
            run-integration: false
          - os: macos-15-intel
            artifact: scala-monitor-x86_64-apple-darwin
            run-integration: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: VirtusLab/scala-cli-setup@v1

      - name: Unit tests
        run: scala-cli --power test .

      - name: Build native binary
        run: scala-cli --power package . -o ${{ matrix.artifact }} --native

      - name: Install sbt
        if: matrix.run-integration
        run: cs install sbt --install-dir /usr/local/bin

      - name: Integration test
        if: matrix.run-integration
        run: scripts/integration-test.sh ./${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  publish:
    needs: build
    if: |
      startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: VirtusLab/scala-cli-setup@v1
        with:
          power: true

      - name: Publish
        run: |
          scala-cli config publish.credentials central.sonatype.com env:SONATYPE_USERNAME env:SONATYPE_PASSWORD
          scala-cli config publish.credentials ossrh-staging-api.central.sonatype.com env:SONATYPE_USERNAME env:SONATYPE_PASSWORD
          ./.github/workflows/import-gpg.sh
          scala-cli publish . --signer gpg --gpg-key DB33C5B9DA1A245B
        env:
          PGP_PASSPHRASE: ""
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        id: download
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          mv artifacts/scala-monitor-x86_64-pc-linux/scala-monitor-x86_64-pc-linux release-assets/
          mv artifacts/scala-monitor-aarch64-pc-linux/scala-monitor-aarch64-pc-linux release-assets/
          mv artifacts/scala-monitor-aarch64-apple-darwin/scala-monitor-aarch64-apple-darwin release-assets/
          mv artifacts/scala-monitor-x86_64-apple-darwin/scala-monitor-x86_64-apple-darwin release-assets/
          # Backward-compat alias: scala-monitor-darwin -> aarch64
          cp release-assets/scala-monitor-aarch64-apple-darwin release-assets/scala-monitor-darwin
          # Backward-compat alias: scala-monitor-linux -> x86_64
          cp release-assets/scala-monitor-x86_64-pc-linux release-assets/scala-monitor-linux

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
