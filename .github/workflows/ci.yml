name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: scala-monitor-linux
          - os: macos-latest
            artifact: scala-monitor-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: VirtusLab/scala-cli-setup@v1

      - name: Build native binary
        run: scala-cli --power package . -o scala-monitor --native

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: scala-monitor

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            scala-monitor-linux/scala-monitor
            scala-monitor-macos/scala-monitor
